# # yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# metadata:
#     template: azd-init@1.11.1
environment:
  name: microsoft-iq-solution-accelerator
  location: eastus
name: microsoft-iq-solution-accelerator

requiredVersions:
  azd: ">= 1.15.0"

metadata:
  template: microsoft-iq-solution-accelerator@1.0

hooks:
  postprovision:
    windows:
      run: |
        Write-Host "=== Azure Deployment Complete ===" -ForegroundColor Green
        Write-Host ""
        Write-Host "AI Foundry Project Endpoint: $env:AZURE_AI_PROJECT_ENDPOINT" -ForegroundColor Cyan
        Write-Host "AI Search Endpoint: $env:AZURE_AI_SEARCH_ENDPOINT" -ForegroundColor Cyan
        Write-Host "Storage Account: $env:AZURE_STORAGE_ACCOUNT_NAME" -ForegroundColor Cyan
        Write-Host ""
        Write-Host "=== Post-Deployment Setup ===" -ForegroundColor Yellow
        Write-Host "Running post-deployment scripts..."
        Write-Host ""
        
        Write-Host "1. Uploading documents to search index..." -ForegroundColor Cyan
        python src/foundry/scripts/01_upload_to_search.py
        
        Write-Host "`n2. Creating AI agents..." -ForegroundColor Cyan
        python src/foundry/scripts/02_create_agent_no_sql.py
        Write-Host ""
        Write-Host "=== Deployment Complete ===" -ForegroundColor Green

      shell: pwsh
      continueOnError: false
      interactive: true
    posix:
      run: |
        echo "=== Azure Deployment Complete ==="
        echo ""
        echo "AI Foundry Project Endpoint: $AZURE_AI_PROJECT_ENDPOINT"
        echo "AI Search Endpoint: $AZURE_AI_SEARCH_ENDPOINT"
        echo "Storage Account: $AZURE_STORAGE_ACCOUNT_NAME"
        echo ""
        echo "=== Post-Deployment Setup ==="
        echo "Running post-deployment scripts..."
        echo ""
        
        echo "1. Uploading documents to search index..."
        python src/foundry/scripts/01_upload_to_search.py
        
        echo ""
        echo "2. Creating AI agents..."
        python src/foundry/scripts/02_create_agent_no_sql.py
        echo ""
        echo "=== Deployment Complete ==="

      shell: sh
      continueOnError: false
      interactive: true